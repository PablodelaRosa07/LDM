<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gestor Financiero</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>Balance Personal</h1>
            <h2 id="balance">$0.00</h2>
        </header>

        <section class="inc-exp-container">
            <div>
                <h4>Ingresos</h4>
                <p id="money-plus" class="money plus">+$0.00</p>
            </div>
            <div>
                <h4>Gastos</h4>
                <p id="money-minus" class="money minus">-$0.00</p>
            </div>
        </section>

        <h3>Historial</h3>
        <ul id="list" class="list">
            </ul>

        <h3>Añadir Transacción</h3>
        <form id="form">
            <div class="form-control">
                <label for="text">Concepto</label>
                <input type="text" id="text" placeholder="Ej: Sueldo, Pizza, Renta..." required>
            </div>
            <div class="form-control">
                <label for="amount">Monto <br> (negativo = gasto, positivo = ingreso)</label>
                <input type="number" id="amount" placeholder="Ej: -20 o 500" step="0.01" required>
            </div>
            <button class="btn">Agregar Movimiento</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
